services:
  - type: web
    name: quizmaster
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn quizmaster.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: quizmaster.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: quizmaster-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
    disk:
      name: quizmaster-media
      mountPath: /var/www/quizmaster/media
      sizeGB: 1

databases:
  - name: quizmaster-db
    plan: free
